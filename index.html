<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinTrack Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet" />

</head>
<body>

    <div id="login-div">
        <h2>
            Welcome Back
        </h2>

        <h3>
            Login to FinTrack Pro
        </h3>
        
        <div>
            <h3>
                Username
            </h3>
            <input type="text" class="text-input" id="username" required />
        </div>
        
        <div>
            <h3>
                Password
            </h3>
            <input type="password" class="text-input" id="password" required />
        </div>
        
        <button class="login-register" id="login">Login</button>
        
        <p id="account-text">
            Don't have an account? 
            <span id="register-here">Register here</span>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
